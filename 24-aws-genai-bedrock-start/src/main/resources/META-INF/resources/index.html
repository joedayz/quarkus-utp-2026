<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Horarios UTP - Quarkus + AWS Bedrock</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%); color: white; padding: 1.5rem 2rem; text-align: center; }
        .header h1 { font-size: 1.5rem; font-weight: 600; }
        .header p { font-size: 0.9rem; opacity: 0.85; margin-top: 0.3rem; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; color: #333; margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.3rem; font-weight: 500; }
        select, textarea { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; font-family: inherit; }
        select { margin-bottom: 1rem; background: white; }
        textarea { resize: vertical; min-height: 80px; margin-bottom: 1rem; }
        textarea:focus, select:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26,35,126,0.1); }
        .btn { background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%); color: white; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; font-weight: 500; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .response-area { background: #f8f9fa; border-radius: 8px; padding: 1.2rem; min-height: 100px; white-space: pre-wrap; line-height: 1.6; color: #333; font-size: 0.95rem; }
        .meta { display: flex; gap: 1rem; margin-top: 0.8rem; font-size: 0.8rem; color: #888; }
        .spinner { display: none; text-align: center; padding: 2rem; color: #1a237e; }
        .spinner.active { display: block; }
        .examples { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
        .example-chip { background: #e8eaf6; color: #1a237e; border: none; padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.82rem; cursor: pointer; }
        .example-chip:hover { background: #c5cae9; }
        .footer { text-align: center; padding: 1rem; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎓 Asistente de Horarios UTP</h1>
        <p>Quarkus + AWS Bedrock (Claude) — Ingeniería de Software</p>
    </div>

    <div class="container">
        <div class="card">
            <h2>Consulta tus horarios</h2>

            <label for="ciclo">Ciclo de estudio</label>
            <select id="ciclo">
                <option value="">Todos los ciclos</option>
                <option value="1">Ciclo 1</option>
                <option value="2">Ciclo 2</option>
                <option value="3">Ciclo 3</option>
                <option value="4">Ciclo 4</option>
            </select>

            <label>Ejemplos de preguntas</label>
            <div class="examples">
                <button class="example-chip" onclick="setQuestion('¿Qué cursos tengo los lunes?')">Cursos del lunes</button>
                <button class="example-chip" onclick="setQuestion('¿A qué hora es Base de Datos I?')">Horario de BD I</button>
                <button class="example-chip" onclick="setQuestion('¿Qué cursos se dictan en los laboratorios?')">Cursos en labs</button>
                <button class="example-chip" onclick="setQuestion('¿Quién es el profesor de Algoritmos?')">Profesor de Algoritmos</button>
                <button class="example-chip" onclick="setQuestion('Muéstrame todos mis horarios organizados por día')">Horarios por día</button>
            </div>

            <label for="question">Tu pregunta</label>
            <textarea id="question" placeholder="Ejemplo: ¿Qué cursos tengo los lunes en 3er ciclo?"></textarea>

            <button class="btn" id="askBtn" onclick="askSchedule()">Consultar</button>
        </div>

        <div class="card" id="resultCard" style="display:none;">
            <h2>Respuesta del asistente</h2>
            <div class="spinner" id="spinner">⏳ Consultando a Claude via AWS Bedrock...</div>
            <div class="response-area" id="response"></div>
            <div class="meta" id="meta"></div>
        </div>
    </div>

    <div class="footer">
        LAB 24 — Microservicios cloud-native con Quarkus en AWS — UTP 2026
    </div>

    <script>
        function setQuestion(q) {
            document.getElementById('question').value = q;
        }

        async function askSchedule() {
            const question = document.getElementById('question').value.trim();
            if (!question) return;

            const cicloVal = document.getElementById('ciclo').value;
            const ciclo = cicloVal ? parseInt(cicloVal) : null;

            const resultCard = document.getElementById('resultCard');
            const spinner = document.getElementById('spinner');
            const response = document.getElementById('response');
            const meta = document.getElementById('meta');
            const btn = document.getElementById('askBtn');

            resultCard.style.display = 'block';
            spinner.classList.add('active');
            response.textContent = '';
            meta.textContent = '';
            btn.disabled = true;

            try {
                const body = { question };
                if (ciclo) body.ciclo = ciclo;

                const res = await fetch('/genai/schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();
                spinner.classList.remove('active');
                response.textContent = data.answer;
                meta.innerHTML = `<span>Modelo: ${data.model}</span><span>Cursos consultados: ${data.cursosConsultados}</span>`;
            } catch (err) {
                spinner.classList.remove('active');
                response.textContent = 'Error al consultar: ' + err.message;
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('question').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askSchedule(); }
        });
    </script>
</body>
</html>
