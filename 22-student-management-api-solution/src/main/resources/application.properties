quarkus.application.name=student-management-api

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=student
quarkus.datasource.password=student

# %dev: Dev Services levanta PostgreSQL en Docker si no defines QUARKUS_DATASOURCE_JDBC_URL.
# Postgres fijo en localhost: export QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://localhost:5432/studentdb
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.hibernate-orm.database.generation=update
%dev.quarkus.hibernate-orm.log.sql=true

# RDS recién creado no tiene tablas: con validate Hibernate falla al arrancar y ECS reinicia la tarea en bucle.
# Esta demo usa update sin migraciones (Flyway). En producción real: migraciones + validate.
%prod.quarkus.hibernate-orm.database.generation=update

# En ECS/prod define QUARKUS_DATASOURCE_JDBC_URL (y credenciales) en la task / GitHub Actions; Quarkus la mapea a quarkus.datasource.jdbc.url.
# Sin JDBC válido la app no arranca (Hibernate validate + PostgreSQL).
%prod.quarkus.datasource.username=student
%prod.quarkus.datasource.password=${STUDENT_DB_PASSWORD:change-me}

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

mp.openapi.extensions.smallrye.info.title=Student Management API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=REST API de estudiantes y calificaciones (mini‑proyecto integrador UTP).

# Métricas Prometheus (en AWS suele integrarse vía ADOT, CloudWatch Agent o scraping)
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true

# Trazas OpenTelemetry → OTLP (Jaeger local). En prod ECS sin collector, desactivar evita ruido y posibles retrasos al exportar.
quarkus.otel.service.name=student-management-api
quarkus.otel.traces.sampler=traceidratio
quarkus.otel.traces.sampler.arg=1
quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317
quarkus.otel.exporter.otlp.traces.protocol=grpc
%prod.quarkus.otel.sdk.disabled=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, spanId=%X{spanId} [%c{2.}] (%t) %s%e%n

# Tests: PostgreSQL vía Dev Services (no fijar jdbc.url en %test)
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.otel.sdk.disabled=true
